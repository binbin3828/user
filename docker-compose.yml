version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: user-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bobby_test}
      MYSQL_USER: ${MYSQL_USER:-xgame}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xgame123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - user-network

  redis:
    image: redis:7-alpine
    container_name: user-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - user-network

  user-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-migrate
    command: ["./UserServer", "migrate"]
    restart: "no"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-xgame}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xgame123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bobby_test}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - user-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-xgame}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xgame123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bobby_test}
      JWT_SECRET: ${JWT_SECRET:-prod-change-me-to-a-long-random-string}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_TRACE_SAMPLE_RATE: ${OTEL_TRACE_SAMPLE_RATE:-0.1}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - user-network

volumes:
  mysql_data:
    driver: local

networks:
  user-network:
    driver: bridge
